<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project — Tessa van der Riet</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <meta property="og:site_name" content="Tessa van der Riet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="project">
  <div class="site-wrapper">

    <!-- Header -->
    <header class="site-header">
      <div class="container">
        <a href="/" class="logo-link">
          <img src="images/TessavanderRiet_LogoWebsite.webp" alt="Tessa van der Riet">
        </a>
        <div class="site-tagline">DIRECTOR&nbsp;&nbsp;|&nbsp;&nbsp;PHOTOGRAPHER</div>
        <button class="menu-toggle" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <nav class="site-nav">
          <a href="film">Film</a>
          <a href="photography">Photography</a>
          <a href="commercial">Commercial</a>
          <a href="contact">Contact</a>
        </nav>
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <div class="container">
        <div id="project-detail" class="project-detail">
          <a id="back-link" href="film" class="back-link">&larr; Back</a>

          <!-- Video embed (if available) -->
          <div id="detail-video" class="detail-video" style="display:none;"></div>

          <!-- Hero image (if no video) -->
          <div id="detail-hero" class="detail-hero" style="display:none;"></div>

          <h2 id="detail-title"></h2>
          <p id="detail-subtitle" style="color: var(--color-subtle); margin-bottom: 8px;"></p>
          <p id="detail-description"></p>

          <!-- Gallery -->
          <div id="detail-gallery" class="detail-gallery"></div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="container">
        &copy; 2026 Tessa van der Riet. All rights reserved.
      </div>
    </footer>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const projectId = params.get('id');
      if (!projectId) {
        window.location.href = 'film';
        return;
      }

      try {
        const doc = await db.collection('projects').doc(projectId).get();
        if (!doc.exists) {
          window.location.href = 'film';
          return;
        }

        const data = doc.data();

        // Set page title
        document.title = `${data.title} — Tessa van der Riet`;

        // Back link based on category
        const backLink = document.getElementById('back-link');
        const categoryPages = { film: 'film', photography: 'photography', commercial: 'commercial' };
        backLink.href = categoryPages[data.category] || 'film';
        backLink.textContent = `\u2190 Back to ${data.category || 'Film'}`;

        // Title & description
        document.getElementById('detail-title').textContent = data.title || '';
        document.getElementById('detail-subtitle').textContent = data.subtitle || '';
        document.getElementById('detail-description').innerHTML = renderText(data.description || '');

        // Video or hero image
        if (data.vimeoUrl) {
          const videoEl = document.getElementById('detail-video');
          videoEl.style.display = '';
          videoEl.innerHTML = `<iframe src="${data.vimeoUrl}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>`;
        } else if (data.thumbnailUrl) {
          const heroEl = document.getElementById('detail-hero');
          heroEl.style.display = '';
          heroEl.innerHTML = `<img src="${data.thumbnailUrl}" alt="${data.title}">`;
        }

        // Gallery images
        if (data.galleryImages && data.galleryImages.length > 0) {
          const galleryEl = document.getElementById('detail-gallery');
          galleryEl.innerHTML = data.galleryImages.map(url =>
            `<img src="${url}" alt="${data.title}" loading="lazy">`
          ).join('');
        }
      } catch (error) {
        console.error('Error loading project:', error);
      }
    });
  </script>
</body>
</html>
